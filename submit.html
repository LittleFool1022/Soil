<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水土保持公示信息提交</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .form-container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .required::after {
            content: "*";
            color: red;
            margin-left: 3px;
        }
    </style>
    <!-- 在head中添加Supabase客户端 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = createClient(
            'https://zsmwcrgsaamslzuvscug.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzbXdjcmdzYWFtc2x6dXZzY3VnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzg3NDA1OTksImV4cCI6MjA1NDMxNjU5OX0.UCwIvCoEOuGxva10JIS2oAwZQ-trykJL1pwgQLn3eQ4'
        );
    </script>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <h2 class="text-center mb-4">水土保持公示信息提交</h2>
            <form id="submitForm">
                <!-- 项目信息 -->
                <div class="mb-3">
                    <label class="form-label required">项目名称</label>
                    <input type="text" class="form-control" name="project_name" required>
                </div>

                <div class="mb-3">
                    <label class="form-label required">建设单位</label>
                    <input type="text" class="form-control" name="company" required>
                </div>

                <div class="mb-3">
                    <label class="form-label required">联系人</label>
                    <input type="text" class="form-control" name="contact_person" required>
                </div>

                <div class="mb-3">
                    <label class="form-label required">联系电话</label>
                    <input type="tel" class="form-control" name="phone" pattern="\d{11}" required>
                </div>

                <!-- 文件上传 -->
                <div class="mb-3">
                    <label class="form-label required">上传公示文件（PDF格式）</label>
                    <input type="file" class="form-control" name="document" accept=".pdf" required>
                </div>

                <button type="submit" class="btn btn-success w-100">提交公示</button>
            </form>
        </div>
    </div>

    <script>
    document.getElementById('submitForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        
        const formData = new FormData(event.target);
        const file = formData.get('document');

        try {
            // 上传文件到Storage
            const fileName = `${Date.now()}_${file.name}`;
            const { data: fileData, error: uploadError } = await supabase.storage
                .from('documents') // 存储桶名称
                .upload(fileName, file);

            if (uploadError) throw uploadError;

            // 获取文件公共URL
            const { data: urlData } = supabase.storage
                .from('documents')
                .getPublicUrl(fileData.path);

            // 准备提交数据
            const submissionData = {
                project_name: formData.get('project_name'),
                company: formData.get('company'),
                contact_person: formData.get('contact_person'),
                phone: formData.get('phone'),
                document_url: urlData.publicUrl // 存储文件URL
            };

            // 插入数据到数据库
            const { data, error } = await supabase
                .from('soil_list')
                .insert([submissionData])
                .select();

            if (error) throw error;
            
            window.location.href = '/success.html';
        } catch (error) {
            console.error('提交失败:', error);
            alert(`提交失败: ${error.message}`);
        }
    });
    </script>
</body>
</html>
