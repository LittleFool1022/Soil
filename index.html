    <!-- 轮播图 -->

        <section id="news" class="mb-5">

                <div class="list-group-item">

            <nav aria-label="Page navigation example">

        <section id="laws" class="mt-5">

            <div class="row">
                <div class="col-md-6">
                    <div class="card">

                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="contact" class="mt-5 mb-5">
            <h2 class="text-success">联系我们</h2>
            <p>电话：+86-17710211481</p>
            <p>邮箱：kuilei1022@gmail.com</p>

    <!-- 引入Bootstrap JS -->
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script>
        // 从数据库获取公示列表
        fetch('https://zsmwcrgsaamslzuvscug.supabase.co/soil_list', {
          method: 'GET',

            'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzbXdjcmdzYWFtc2x6dXZzY3VnIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTczODc0MDU5OSwiZXhwIjoyMDU0MzE2NTk5fQ.IxNArEl8cJg4HMNZeHYMirzfXaQeDuvLuYLjX5b4GQA'
          }
        })
        .then(response => {
        if (!response.ok) {
            throw new Error('Network response was not ok ' + response.statusText);

        return response.json();
        })
        .then(data => {
        const list = document.querySelector('#news .list-group');
        data.forEach(item => {
            const li = document.createElement('li');
            li.className = 'list-group-item';
            li.innerHTML = `<h5 class="mb-1">${item.project_name}</h5><p class="mb-0">${item.date}</p><a href="${item.pdf_url}" class="btn btn-primary" target="_blank">查看详情</a>`;
            list.appendChild(li);
        });
        })
          .catch(error => console.error('Error fetching public list:', error));
        </script>

</body>
</html>
