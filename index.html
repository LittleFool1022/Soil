<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水土保持公示网</title>
    <link rel="stylesheet" href="styles.css">
    <!-- 引入Bootstrap快速美化 -->
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="#">水土保持公示网</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="#home">首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="#news">公示公告</a></li>
                    <li class="nav-item"><a class="nav-link" href="#laws">政策法规</a></li>
                    <li class="nav-item"><a class="nav-link" href="#contact">联系我们</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 轮播图 -->
    <div id="carousel" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="assets/images/banner1.jpg" class="d-block w-100" alt="水土保持宣传图">
            </div>
        </div>
    </div>

    <!-- 主要内容 -->
    <div class="container mt-4">

        <section id="announcement" class="mt-5">
            <h2 class="text-success">公示申请</h2>
            <a href="submit.html" class="btn btn-light ms-2"><i class="bi bi-upload"></i> 我要公示</a>
        </section>

        <section id="news" class="mb-5">
            <h2 class="text-success">最新公示公告</h2>
            <ul class="list-group" id="announcement-list">
                <!-- 公告列表将通过 JavaScript 动态生成 -->
            </ul>
            <nav aria-label="Page navigation example">
                <ul class="pagination justify-content-center" id="pagination">
                    <!-- 分页链接将通过 JavaScript 动态生成 -->
                </ul>
            </nav>
        </section>

        <section id="laws" class="mt-5">
            <h2 class="text-success">政策法规</h2>
            <div class="row">
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">《中华人民共和国水土保持法》</h5>
                            <a href="assets/images/water_soil_law.pdf" class="btn btn-success">下载PDF</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="contact" class="mt-5 mb-5">
            <h2 class="text-success">联系我们</h2>
            <p>电话：+86-17710211481</p>
            <p>邮箱：kuilei1022@gmail.com</p>
        </section>
    </div>

    <!-- 引入Bootstrap JS -->
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentPage = 1;
        const itemsPerPage = 20;
        const公告列表容器 = document.querySelector('#announcement-list');
        const分页容器 = document.querySelector('#pagination');

        function fetchAnnouncements(page) {
            fetch(`https://zsmwcrgsaamslzuvscug.supabase.co/soil_list?page=${page}&limit=${itemsPerPage}`, {
                method: 'GET',
                headers: {
                    'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzbXdjcmdzYWFtc2x6dXZzY3VnIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTczODc0MDU5OSwiZXhwIjoyMDU0MzE2NTk5fQ.IxNArEl8cJg4HMNZeHYMirzfXaQeDuvLuYLjX5b4GQA'
                }
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok ' + response.statusText);
                }
                return response.json();
            })
            .then(data => {
                公告列表容器.innerHTML = '';
                data.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'list-group-item';
                    li.innerHTML = `<h5 class="mb-1">${item.project_name}</h5><p class="mb-0">${item.date}</p><a href="detail.html?id=${item.id}" class="btn btn-primary">查看详情</a>`;
                    公告列表容器.appendChild(li);
                });
                updatePagination(data.length, page, itemsPerPage);
            })
            .catch(error => console.error('Error fetching public list:', error));
        }

        function updatePagination(totalItems, currentPage, itemsPerPage) {
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            分页容器.innerHTML = '';
            if (totalPages > 1) {
                for (let i = 1; i <= totalPages; i++) {
                    const li = document.createElement('li');
                    li.className = 'page-item';
                    if (i === currentPage) {
                        li.className += ' active';
                        li.innerHTML = `<span class="page-link">${i}</span>`;
                    } else {
                        li.innerHTML = `<a class="page-link" href="javascript:void(0)" onclick="fetchAnnouncements(${i})">${i}</a>`;
                    }
                    分页容器.appendChild(li);
                }
            }
        }

        // 初始化加载第一页数据
        fetchAnnouncements(currentPage);
    </script>

</body>
</html>
